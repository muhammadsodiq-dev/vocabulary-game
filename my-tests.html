<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Tests — Vocab Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-scrim" id="sidebarScrim"></div>
  <div class="main">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:14px">
        <button class="menu-toggle" id="menuToggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
        <div>
          <h1 data-i18n="mytests_title"></h1>
          <div class="topbar-subtitle" data-i18n="mytests_subtitle"></div>
        </div>
      </div>
      <div class="topbar-actions"><div id="userMenuSlot"></div></div>
    </header>

    <div class="content">
      <div class="card">
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th data-i18n="col_lesson"></th><th data-i18n="col_words"></th><th data-i18n="col_status"></th><th data-i18n="col_best_score"></th><th data-i18n="col_action"></th></tr></thead>
            <tbody id="myTestsBody">
              <tr><td colspan="5"><div class="skeleton" style="height:20px"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/i18n.js"></script>
<script src="js/ui.js"></script>
<script src="js/layout.js"></script>
<script src="js/my-tests.js"></script>
</body>
</html>
