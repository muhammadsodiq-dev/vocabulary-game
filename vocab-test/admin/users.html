<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Users — Vocab Test Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/app.css">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-scrim" id="sidebarScrim"></div>
  <div class="main">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:14px">
        <button class="menu-toggle" id="menuToggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
        <div><h1 data-i18n="admin_users_title"></h1></div>
      </div>
      <div class="topbar-actions"><div id="userMenuSlot"></div></div>
    </header>

    <div class="content">
      <div class="card">
        <div class="table-toolbar">
          <div class="input-icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg><input class="input" id="searchInput" data-i18n-placeholder="search_user_placeholder"></div>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th data-i18n="col_full_name"></th><th data-i18n="col_email"></th><th data-i18n="col_role"></th><th data-i18n="col_joined_at"></th><th data-i18n="col_actions"></th></tr></thead>
            <tbody id="tblBody"><tr><td colspan="5"><div class="skeleton" style="height:20px"></div></td></tr></tbody>
          </table>
        </div>
        <div class="pagination-bar" id="pager"></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-scrim" id="userModal">
  <div class="modal">
    <div class="modal-header"><h3 data-i18n="modal_edit_user"></h3><button class="btn-icon" data-close-modal><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>
    <form id="userForm">
      <div class="modal-body">
        <input type="hidden" id="userId">
        <div class="field"><label for="userName" data-i18n="label_full_name"></label><input class="input" id="userName" required></div>
        <div class="field"><label for="userEmail" data-i18n="label_email"></label><input class="input" type="email" id="userEmail" required></div>
        <div class="field"><label for="userRole" data-i18n="label_role"></label><select class="select" id="userRole"><option value="USER">USER</option><option value="ADMIN">ADMIN</option></select></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" data-close-modal data-i18n="btn_cancel"></button>
        <button type="submit" class="btn btn-primary" id="saveUserBtn" data-i18n="btn_save"></button>
      </div>
    </form>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/i18n.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/data-table.js"></script>
<script src="../js/admin/users.js"></script>
</body>
</html>
