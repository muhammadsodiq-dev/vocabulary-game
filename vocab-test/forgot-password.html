<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Vocab Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="auth-page">
  <div style="position:absolute;top:20px;right:20px;z-index:2" id="langSlot"></div>
  <div class="auth-brand">
    <div class="auth-brand-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div>
    <div><strong>Vocab Test</strong><span data-i18n="brand_tagline"></span></div>
  </div>

  <div class="auth-card">
    <div class="auth-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></div>
    <h1 data-i18n="forgot_title"></h1>
    <p class="auth-sub" data-i18n="forgot_subtitle"></p>

    <form id="forgotForm" novalidate>
      <div class="field" id="f-email">
        <label for="email" data-i18n="label_email"></label>
        <input class="input" type="email" id="email" placeholder="john.doe@example.com" autocomplete="email" required>
        <div class="field-error">Enter a valid email address.</div>
      </div>
      <button class="btn btn-primary btn-block" type="submit" id="sendBtn" data-i18n="btn_send_reset"></button>
    </form>

    <a class="auth-back" style="justify-content:center;width:100%" href="login.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg><span data-i18n="back_to_login"></span></a>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/i18n.js"></script>
<script src="js/ui.js"></script>
<script src="js/forgot-password.js"></script>
</body>
</html>
