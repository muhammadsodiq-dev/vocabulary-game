<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Email — Vocab Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="auth-page">
  <div style="position:absolute;top:20px;right:20px;z-index:2" id="langSlot"></div>
  <div class="auth-brand">
    <div class="auth-brand-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div>
    <div><strong>Vocab Test</strong><span data-i18n="brand_tagline"></span></div>
  </div>

  <div class="auth-card" style="text-align:center">
    <div class="auth-icon" style="margin-left:auto;margin-right:auto"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg></div>
    <h1 data-i18n="verify_title"></h1>
    <p class="auth-sub"><span data-i18n="verify_subtitle_prefix"></span> <strong id="targetEmail">your email</strong></p>

    <form id="verifyForm" novalidate>
      <div class="otp-row">
        <input class="otp-box" inputmode="numeric" maxlength="1" data-otp="0">
        <input class="otp-box" inputmode="numeric" maxlength="1" data-otp="1">
        <input class="otp-box" inputmode="numeric" maxlength="1" data-otp="2">
        <input class="otp-box" inputmode="numeric" maxlength="1" data-otp="3">
      </div>
      <div class="otp-resend">
        <span data-i18n="resend_prompt"></span> <button type="button" id="resendBtn" data-i18n="btn_resend"></button><span id="resendTimer"></span>
      </div>
      <button class="btn btn-primary btn-block" type="submit" id="verifyBtn" style="margin-top:8px" data-i18n="btn_verify"></button>
    </form>

    <a class="auth-back" href="register.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg><span data-i18n="back_to_register"></span></a>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/i18n.js"></script>
<script src="js/ui.js"></script>
<script src="js/verify-email.js"></script>
</body>
</html>
