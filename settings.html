<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — Vocab Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-scrim" id="sidebarScrim"></div>
  <div class="main">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:14px">
        <button class="menu-toggle" id="menuToggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
        <div><h1 data-i18n="settings_title"></h1></div>
      </div>
      <div class="topbar-actions"><div id="userMenuSlot"></div></div>
    </header>

    <div class="content">
      <div class="card detail-card" style="margin-bottom:20px">
        <div class="card-header"><h3 data-i18n="language_label"></h3></div>
        <div class="card-body">
          <div class="switch-row" style="border:none;padding-top:0">
            <div><strong data-i18n="language_label"></strong><span>O'zbekcha / English</span></div>
            <div id="langSlotSettings"></div>
          </div>
        </div>
      </div>

      <div class="card detail-card" style="margin-bottom:20px">
        <div class="card-header"><h3 data-i18n="notifications"></h3></div>
        <div class="card-body">
          <div class="switch-row">
            <div><strong data-i18n="notif_email_title"></strong><span data-i18n="notif_email_desc"></span></div>
            <label class="switch"><input type="checkbox" id="notifEmail" checked><span class="switch-track"></span></label>
          </div>
          <div class="switch-row">
            <div><strong data-i18n="notif_reminders_title"></strong><span data-i18n="notif_reminders_desc"></span></div>
            <label class="switch"><input type="checkbox" id="notifReminders" checked><span class="switch-track"></span></label>
          </div>
        </div>
      </div>

      <div class="card detail-card">
        <div class="card-header"><h3 data-i18n="account_section"></h3></div>
        <div class="card-body">
          <p class="text-muted" style="margin-bottom:16px;font-size:13.5px" data-i18n="signout_hint"></p>
          <button class="btn btn-danger" id="logoutBtn" data-i18n="btn_logout"></button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/i18n.js"></script>
<script src="js/ui.js"></script>
<script src="js/layout.js"></script>
<script src="js/settings.js"></script>
</body>
</html>
