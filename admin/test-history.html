<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test History — Vocab Test Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/app.css">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-scrim" id="sidebarScrim"></div>
  <div class="main">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:14px">
        <button class="menu-toggle" id="menuToggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
        <div><h1 data-i18n="admin_history_title"></h1></div>
      </div>
      <div class="topbar-actions"><div id="userMenuSlot"></div></div>
    </header>

    <div class="content">
      <div class="card">
        <div class="table-toolbar">
          <div class="input-icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg><input class="input" id="searchInput" data-i18n-placeholder="search_user_lesson_placeholder"></div>
          <select class="select" id="lessonFilter"><option value="" data-i18n="filter_all_lessons"></option></select>
          <select class="select" id="statusFilter"><option value="" data-i18n="filter_all_statuses"></option><option value="Completed" data-i18n="status_completed"></option><option value="In Progress" data-i18n="status_in_progress"></option></select>
          <input class="input" type="date" id="dateFilter" style="width:auto">
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th data-i18n="col_user"></th><th data-i18n="col_lesson"></th><th data-i18n="col_score"></th><th data-i18n="col_total"></th><th data-i18n="col_correct"></th><th data-i18n="col_status"></th><th data-i18n="col_finished_at"></th></tr></thead>
            <tbody id="tblBody"><tr><td colspan="7"><div class="skeleton" style="height:20px"></div></td></tr></tbody>
          </table>
        </div>
        <div class="pagination-bar" id="pager"></div>
      </div>
    </div>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/i18n.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/data-table.js"></script>
<script src="../js/admin/test-history.js"></script>
</body>
</html>
