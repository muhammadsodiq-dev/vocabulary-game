<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Vocab Test Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/app.css">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-scrim" id="sidebarScrim"></div>
  <div class="main">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:14px">
        <button class="menu-toggle" id="menuToggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
        <div>
          <h1 data-i18n="admin_dashboard_title"></h1>
          <div class="topbar-subtitle" data-i18n="admin_dashboard_subtitle"></div>
        </div>
      </div>
      <div class="topbar-actions">
        <div class="daterange-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/></svg><span id="dateRangeText">Last 7 days</span></div>
        <div id="userMenuSlot"></div>
      </div>
    </header>

    <div class="content">
      <div class="stat-grid" id="statGrid">
        <div class="skeleton" style="height:104px"></div>
        <div class="skeleton" style="height:104px"></div>
        <div class="skeleton" style="height:104px"></div>
        <div class="skeleton" style="height:104px"></div>
        <div class="skeleton" style="height:104px"></div>
      </div>

      <div style="display:grid;grid-template-columns:1.6fr 1fr;gap:20px;align-items:start" id="dashGrid">
        <div class="card">
          <div class="card-header"><h3 data-i18n="important_rules"></h3></div>
          <div class="card-body">
            <div class="rules-list">
              <div class="rule-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg><span data-i18n="rule_1"></span></div>
              <div class="rule-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg><span data-i18n="rule_2"></span></div>
              <div class="rule-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg><span data-i18n="rule_3"></span></div>
              <div class="rule-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg><span data-i18n="rule_4"></span></div>
              <div class="rule-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg><span data-i18n="rule_5"></span></div>
              <div class="rule-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg><span data-i18n="rule_6"></span></div>
              <div class="rule-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg><span data-i18n="rule_7"></span></div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header"><h3 data-i18n="quick_actions"></h3></div>
          <div class="card-body">
            <div class="quick-actions-grid">
              <a class="btn btn-secondary" href="lessons.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg><span data-i18n="btn_add_lesson"></span></a>
              <a class="btn btn-secondary" href="vocabulary-words.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg><span data-i18n="btn_add_word"></span></a>
              <button class="btn btn-outline" id="exportBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg><span data-i18n="btn_export_reports"></span></button>
              <button class="btn btn-outline" id="logsBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><span data-i18n="btn_system_logs"></span></button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/i18n.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/admin/dashboard.js"></script>
</body>
</html>
