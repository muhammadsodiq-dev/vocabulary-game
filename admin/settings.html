<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — Vocab Test Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/app.css">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-scrim" id="sidebarScrim"></div>
  <div class="main">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:14px">
        <button class="menu-toggle" id="menuToggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
        <div><h1 data-i18n="admin_settings_title"></h1></div>
      </div>
      <div class="topbar-actions"><div id="userMenuSlot"></div></div>
    </header>

    <div class="content">
      <div class="card detail-card" style="margin-bottom:20px">
        <div class="card-header"><h3 data-i18n="language_label"></h3></div>
        <div class="card-body">
          <div class="switch-row" style="border:none;padding-top:0">
            <div><strong data-i18n="language_label"></strong><span>O'zbekcha / English</span></div>
            <div id="langSlotSettings"></div>
          </div>
        </div>
      </div>

      <div class="card detail-card" style="margin-bottom:20px">
        <div class="card-header"><h3 data-i18n="test_rules_card"></h3></div>
        <div class="card-body">
          <form id="rulesForm">
            <div class="field-row">
              <div class="field"><label for="questionsPerTest" data-i18n="label_questions_per_test"></label><input class="input" type="number" id="questionsPerTest" min="1" max="50" value="10"></div>
              <div class="field"><label for="minWords" data-i18n="label_min_words"></label><input class="input" type="number" id="minWords" min="1" max="50" value="10"></div>
            </div>
            <button class="btn btn-primary" type="submit" id="saveRulesBtn" data-i18n="btn_save_rules"></button>
          </form>
        </div>
      </div>

      <div class="card detail-card">
        <div class="card-header"><h3 data-i18n="admin_account_card"></h3></div>
        <div class="card-body">
          <div class="field"><label data-i18n="label_full_name"></label><input class="input" id="adminName" disabled></div>
          <div class="field"><label data-i18n="label_email"></label><input class="input" id="adminEmail" disabled></div>
          <a class="btn btn-outline" href="../forgot-password.html" data-i18n="btn_reset_password"></a>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/i18n.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/admin/settings.js"></script>
</body>
</html>
