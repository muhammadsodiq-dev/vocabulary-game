<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard — Vocab Test Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/app.css">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-scrim" id="sidebarScrim"></div>
  <div class="main">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:14px">
        <button class="menu-toggle" id="menuToggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
        <div><h1 data-i18n="leaderboard_title"></h1></div>
      </div>
      <div class="topbar-actions"><div id="userMenuSlot"></div></div>
    </header>

    <div class="content">
      <div class="card">
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th data-i18n="col_rank"></th><th data-i18n="col_user"></th><th data-i18n="col_email"></th><th data-i18n="col_score"></th></tr></thead>
            <tbody id="tblBody"><tr><td colspan="4"><div class="skeleton" style="height:20px"></div></td></tr></tbody>
          </table>
        </div>
        <div class="pagination-bar" id="pager"></div>
      </div>
    </div>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/i18n.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/data-table.js"></script>
<script src="../js/admin/leaderboard.js"></script>
</body>
</html>
